#------------------------------------------------------------------------------
# 第十二部分-B：内置补丁执行函数
#   每个补丁对应一个专用的执行函数
#------------------------------------------------------------------------------

#【build-config.conf-12.02.01】
# 内置补丁执行函数: RAX3000M mt76 驱动更新
apply_patch_rax3000m_mt76() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1
    
    log "🔧 执行补丁: RAX3000M mt76 驱动更新"
    
    if [ ! -d "package/kernel/mt76" ]; then
        log "⚠️ 未找到 package/kernel/mt76 目录，跳过补丁"
        return 0
    fi
    
    log "🔧 拉取最新 mt76 驱动代码..."
    cd package/kernel/mt76
    
    git fetch origin || {
        log "⚠️ git fetch 失败，继续"
        cd "$build_dir"
        return 0
    }
    
    git checkout main 2>/dev/null || {
        log "⚠️ 无 main 分支，尝试 master 分支"
        git checkout master || {
            log "⚠️ 切换分支失败，跳过补丁"
            cd "$build_dir"
            return 0
        }
    }
    
    cd "$build_dir"
    
    log "🔄 更新 mt76 包索引..."
    make package/kernel/mt76/update V=s > /tmp/build-logs/mt76_patch.log 2>&1 || {
        log "⚠️ make update 失败，继续（编译时会重新处理）"
    }
    
    log "✅ RAX3000M mt76 驱动补丁执行完成"
    return 0
}
#【build-config.conf-12.02.01-end】

