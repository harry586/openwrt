#【build-config.conf-12.02】
#------------------------------------------------------------------------------
# 第十二部分-B：内置补丁执行函数
#   每个补丁对应一个专用的执行函数
#------------------------------------------------------------------------------

#【build-config.conf-12.02.01】
# 内置补丁执行函数: AC42U ath10k 固件更新
apply_patch_ac42u_ath10k() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1
    
    log "🔧 执行补丁: AC42U ath10k 固件更新"
    
    # 使用通用函数查找固件目录
    local firmware_dir=$(find_firmware_package_dir "ath10k" "ath10k-ct")
    if [ -z "$firmware_dir" ] || [ ! -d "$firmware_dir" ]; then
        log "⚠️ 未找到 ath10k 固件目录，补丁跳过（不影响编译）"
        return 0
    fi
    
    log "📁 找到固件目录: $firmware_dir"
    
    # 尝试更新 Makefile 下载源
    local makefile="$firmware_dir/Makefile"
    if [ -f "$makefile" ]; then
        cp "$makefile" "$makefile.bak.$(date +%Y%m%d%H%M%S)"
        if grep -q "kvalo/ath10k-firmware" "$makefile"; then
            sed -i 's|kvalo/ath10k-firmware|greearb/ath10k-ct-firmware|g' "$makefile"
            log "  ✅ 已更新 ath10k 固件下载源"
        else
            log "  ℹ️ Makefile 已是其他源，跳过修改"
        fi
    fi
    
    # 预置 CT 固件到 files
    local target_fw_dir="files/lib/firmware/ath10k/QCA9888/hw2.0"
    mkdir -p "$target_fw_dir"
    wget -q -O "$target_fw_dir/firmware-ct.bin" \
        "https://github.com/greearb/ath10k-ct-firmware/raw/master/ct-firmware/IPQ4019/firmware-6-ct-full-community-12.bin" 2>/dev/null || {
        log "⚠️ 自动下载固件失败（可忽略，不影响编译）"
    }
    
    log "✅ AC42U ath10k 固件更新补丁执行完成"
    return 0
}
#【build-config.conf-12.02.01-end】

