#------------------------------------------------------------------------------
# 第十二部分-C：通用补丁辅助函数
#   供所有内置补丁调用，避免硬编码路径
#------------------------------------------------------------------------------

# 自动查找固件包目录
# 参数：关键词列表（如 ath10k mt76）
# 返回：找到的第一个目录路径（打印到 stdout），无结果返回空
find_firmware_package_dir() {
    local keywords=("$@")
    for keyword in "${keywords[@]}"; do
        # 尝试常见路径
        for dir in "package/firmware/$keyword" "package/firmware/linux-firmware/$keyword"; do
            if [ -d "$dir" ]; then
                echo "$dir"
                return 0
            fi
        done
        # 模糊搜索
        local found=$(find package/firmware -maxdepth 3 -type d -name "*$keyword*" 2>/dev/null | head -1)
        if [ -n "$found" ]; then
            echo "$found"
            return 0
        fi
    done
    return 1
}

# 自动查找设备树文件（用于 DTS/DTSI 修改）
# 参数1：目标平台（如 ath79）
# 参数2：设备关键词（如 wndr3800）
# 返回：找到的文件路径（打印到 stdout），无结果返回空
find_device_tree_file() {
    local target="$1"
    local keyword="$2"
    local search_dir="target/linux/$target"
    if [ ! -d "$search_dir" ]; then
        return 1
    fi
    # 查找 dts/dtsi 文件，支持通配符
    local file=$(find "$search_dir" -type f \( -name "*${keyword}*" -o -name "*${keyword/-/_}*" \) \( -name "*.dts" -o -name "*.dtsi" \) 2>/dev/null | head -1)
    if [ -n "$file" ]; then
        echo "$file"
        return 0
    fi
    return 1
}
