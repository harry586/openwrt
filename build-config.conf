#【build-config.conf-12.01】
#------------------------------------------------------------------------------
# 第十二部分-A：内置补丁配置
#   格式：一行一个补丁，字段用 "|" 分隔：
#   设备匹配模式|源码类型|分支|补丁名称|补丁描述|执行函数名
#------------------------------------------------------------------------------
BUILTIN_PATCH_LIST=(
    "*ac42u*|immortalwrt|*|ac42u-ath10k|更新ath10k无线固件|apply_patch_ac42u_ath10k"
    "*|*|*|usb-power-fix|修复USB电源管理问题|apply_patch_usb_power_fix"
    "*|*|*|disable-samba4|禁用samba4启用ksmbd|apply_patch_disable_samba4_enable_ksmbd"
)
