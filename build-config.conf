#   控制编译过程的并行度和资源使用
#   根据你的机器性能调整这些值
#------------------------------------------------------------------------------

##常修改## 高性能系统阈值（CPU核心数）
##常修改## 如果CPU核心数 >= 此值，视为高性能系统
: ${HIGH_PERF_CORES:=4}

##常修改## 高性能系统阈值（内存MB）
##常修改## 如果内存MB >= 此值，视为高性能系统
: ${HIGH_PERF_MEM:=4096}

##常修改## 标准系统阈值（CPU核心数）
: ${STD_PERF_CORES:=2}

##常修改## 标准系统阈值（内存MB）
: ${STD_PERF_MEM:=2048}

##常修改## 高性能系统并行任务数
##常修改## 高性能系统使用的编译并行数
: ${HIGH_PERF_JOBS:=4}

##常修改## 标准系统并行任务数
