#【build-config.conf-01】
#!/bin/bash
#【build-config.conf】
# OpenWrt 智能固件构建系统 - 统一配置文件
# 位置: 仓库根目录 /build-config.conf
# 版本: 2.0.1
# 最后更新: 2026-04-25
#
# 使用方法：
# 1. 此文件放在仓库根目录
# 2. 根据需要修改下方的配置值（带 ##常修改## 的是最常修改的项）
# 3. 构建脚本会自动加载此配置
#
# 配置优先级：环境变量 > 此配置文件 > 脚本内默认值
# 如需临时覆盖，可在运行脚本前设置环境变量：
#   export BUILD_DIR="/custom/path"
#   ./firmware-config/scripts/build_firmware_main.sh <命令>
#==================================================
#【build-config.conf-01-end】

#【build-config.conf-02】
#------------------------------------------------------------------------------
# 第一部分：目录路径配置
#   修改这些路径可以改变构建过程中各种文件的存放位置
#   这是最常修改的部分，根据你的实际环境调整
#------------------------------------------------------------------------------

##常修改## 主构建目录 - 所有编译过程的工作目录
##常修改## 要求：至少有20GB可用空间，建议放在高速磁盘上
##常修改## 例如：BUILD_DIR="/ssd/openwrt-build" 或 BUILD_DIR="$HOME/openwrt-build"
: ${BUILD_DIR:="/mnt/openwrt-build"}

##常修改## 日志目录 - 存放构建过程中的日志文件
##常修改## 会自动创建，建议放在有足够空间的位置
: ${LOG_DIR:="/tmp/build-logs"}

##常修改## 备份目录 - 存放配置文件备份
##常修改## 构建前会自动备份现有配置到此目录
: ${BACKUP_DIR:="/tmp/openwrt_backup"}

## 配置文件根目录 - 存放所有.config配置文件的地方
## 通常不需要修改，除非你改变了项目结构
: ${CONFIG_DIR:="$REPO_ROOT/firmware-config/config"}

## 自定义文件目录 - 存放要集成到固件的自定义文件
## 目录结构会原样复制到固件的 /etc/custom-files/ 下
: ${CUSTOM_FILES_DIR:="$REPO_ROOT/firmware-config/custom-files"}
#【build-config.conf-02-end】

#【build-config.conf-03】
#------------------------------------------------------------------------------
# 第二部分：Git仓库URL配置
#   修改这些URL可以更换源码来源（如使用官方OpenWrt或其他分支）
#------------------------------------------------------------------------------

##常修改## 源码仓库选择 (immortalwrt/openwrt/lede)
##常修改## 可选值：
##常修改##   - immortalwrt: ImmortalWrt 仓库
##常修改##   - openwrt: OpenWrt 官方仓库
##常修改##   - lede: LEDE 仓库 (coolsnowwolf/lede)
: ${SOURCE_REPO_TYPE:="immortalwrt"}

## ImmortalWrt 仓库地址
: ${IMMORTALWRT_URL:="https://github.com/immortalwrt/immortalwrt.git"}

## OpenWrt 官方仓库地址
: ${OPENWRT_URL:="https://github.com/openwrt/openwrt.git"}

## LEDE 仓库地址 (coolsnowwolf/lede)
: ${LEDE_URL:="https://github.com/coolsnowwolf/lede.git"}

## 自定义仓库地址（当 SOURCE_REPO_TYPE="custom" 时使用）
: ${CUSTOM_REPO_URL:=""}

## Packages feed 地址 - 包含各种软件包
: ${PACKAGES_FEED_URL:="https://github.com/immortalwrt/packages.git"}

## Luci feed 地址 - Web管理界面
: ${LUCI_FEED_URL:="https://github.com/immortalwrt/luci.git"}

## TurboACC feed 地址 - 网络加速组件（仅normal模式使用）
## 如需禁用TurboACC，可注释掉此行或设置为空
: ${TURBOACC_FEED_URL:="https://github.com/chenmozhijin/turboacc"}
#【build-config.conf-03-end】

#【build-config.conf-04】
#------------------------------------------------------------------------------
# 第三部分：版本分支配置
#   定义不同版本对应的分支名称
#------------------------------------------------------------------------------

## 23.05 版本对应的分支名
: ${BRANCH_23_05:="openwrt-23.05"}

## 21.02 版本对应的分支名
: ${BRANCH_21_02:="openwrt-21.02"}

## LEDE 分支 (coolsnowwolf/lede 固定使用 master)
: ${BRANCH_LEDE:="master"}

## 根据源码类型选择对应的分支映射
get_branch_name() {
    local version_selection="$1"
    local repo_type="${2:-$SOURCE_REPO_TYPE}"
    
    case "$repo_type" in
        "immortalwrt"|"openwrt")
            if [ "$version_selection" = "23.05" ]; then
                echo "openwrt-23.05"
            else
                echo "openwrt-21.02"
            fi
            ;;
        "lede")
            echo "master"
            ;;
        *)
            echo "openwrt-23.05"
            ;;
    esac
}
#【build-config.conf-04-end】

#【build-config.conf-05】
#------------------------------------------------------------------------------
# 第四部分：配置文件名称映射
#   修改这些可以改变脚本查找的配置文件名称
#   注意：这些文件必须存在于 $CONFIG_DIR 目录中
#------------------------------------------------------------------------------

## 基础配置文件 - 所有固件都会包含的配置
: ${CONFIG_BASE:="base.config"}

## 正常模式专用配置文件（启用TurboACC等高级功能）
: ${CONFIG_NORMAL:="normal.config"}

## USB通用配置文件 - 包含基础USB支持
: ${CONFIG_USB_GENERIC:="usb-generic.config"}

## USB特定配置文件（如果存在会覆盖通用配置）
## 格式：usb-{平台名}.config，例如 usb-ipq40xx.config
: ${CONFIG_USB_SPECIFIC_PREFIX:="usb-"}

## 设备配置文件目录 - 存放各设备专用配置
: ${DEVICE_CONFIG_DIR:="devices"}

## 设备配置文件后缀
: ${DEVICE_CONFIG_SUFFIX:=".config"}
#【build-config.conf-05-end】

#【build-config.conf-06】
#------------------------------------------------------------------------------
# 第五部分：内核版本配置 - 动态生成
#   不再硬编码，而是在运行时通过脚本检测
#   以下配置控制检测行为
#------------------------------------------------------------------------------

## 是否启用内核配置动态检测（true/false）
## 设为true时，脚本会自动扫描 target/linux/$TARGET/ 目录下的 config-* 文件
: ${ENABLE_DYNAMIC_KERNEL_DETECTION:="true"}

## 内核配置文件匹配模式
## 用于查找内核配置文件的glob模式
: ${KERNEL_CONFIG_PATTERN:="config-*"}

## 内核版本优先级顺序（用空格分隔）
## 检测到多个内核版本时，按此顺序选择第一个匹配的
## 例如：优先使用6.1，然后是5.15，最后是5.10
: ${KERNEL_VERSION_PRIORITY:="6.6 6.1 5.15 5.10 5.4"}

## 内核配置提取模式
## 定义从内核配置文件提取哪些配置项的正则表达式
## 可以在这里添加更多需要提取的配置模式
KERNEL_EXTRACT_PATTERNS=(
    "^CONFIG_USB_"           # USB相关
    "^CONFIG_PHY_"           # PHY相关
    "^CONFIG_DWC"            # DWC控制器
    "^CONFIG_XHCI"           # XHCI控制器
    "^CONFIG_EXTCON"         # 外部连接器
    "^CONFIG_COMMON_CLK"     # 通用时钟
    "^CONFIG_ARCH_"          # 架构相关
    "^CONFIG_USB_SUPPORT"    # USB支持
    "^CONFIG_USB_COMMON"     # USB通用
)
#【build-config.conf-06-end】

#【build-config.conf-07】
#------------------------------------------------------------------------------
# 第六部分：USB驱动包配置 ##
#   定义各种USB驱动包，可以按需增删
#   这是最常修改的部分，根据你的需求调整USB支持
#------------------------------------------------------------------------------

##常修改## 基础USB驱动包 - 所有平台都需要的基础支持
##常修改## 可以按需增删，用#注释掉不需要的
BASE_USB_PACKAGES=(
    "kmod-usb-core"           # USB核心（必须）
    "kmod-usb-common"         # USB通用（必须）
    "kmod-usb2"               # USB 2.0（必须）
    "kmod-usb3"               # USB 3.0（推荐）
    "kmod-usb-storage"        # USB存储（必须）
    "kmod-scsi-core"          # SCSI核心（必须）
    "block-mount"             # 块设备挂载（推荐）
    "automount"               # 自动挂载（推荐）
    "usbutils"                # USB工具（可选）
)

##常修改## 扩展USB驱动包 - 增强功能（按需启用）
EXTENDED_USB_PACKAGES=(
    "kmod-usb-storage-uas"    # UAS加速（推荐）
    "kmod-usb-storage-extras" # 额外存储协议（可选）
    "kmod-scsi-generic"       # 通用SCSI（可选）
    "kmod-usb-ehci"           # EHCI控制器（可选）
    "kmod-usb-ohci"           # OHCI控制器（可选）
)

##常修改## 文件系统支持 - 用于挂载USB存储设备
##常修改## 根据你的需求选择文件系统支持
FS_SUPPORT_PACKAGES=(
    "kmod-fs-ext4"            # ext4文件系统（推荐）
    "kmod-fs-vfat"            # FAT文件系统（推荐，用于U盘）
    "kmod-fs-exfat"           # exFAT文件系统（推荐，大文件）
    "kmod-fs-ntfs3"           # NTFS文件系统（可选，Windows兼容）
    "kmod-nls-utf8"           # UTF-8编码（必须）
    "kmod-nls-cp936"          # 中文编码（可选，中文文件名）
)
#【build-config.conf-07-end】

#【build-config.conf-08】
#------------------------------------------------------------------------------
# 第七部分：平台专用USB驱动 - 动态生成
#   从support.sh自动获取平台信息，无需手动维护
#   以下配置控制平台驱动的动态生成行为
#------------------------------------------------------------------------------

## 是否启用平台专用驱动动态生成（true/false）
## 设为true时，脚本会从support.sh获取平台信息并自动生成驱动列表
: ${ENABLE_DYNAMIC_PLATFORM_DRIVERS:="true"}

## support.sh脚本路径
: ${SUPPORT_SCRIPT:="$REPO_ROOT/support.sh"}

## 平台驱动映射规则（作为动态生成的补充）
## 格式：PLATFORM_DRIVER_RULES["平台名"]="检测命令"
## 例如：检测高通平台是否需要特定驱动
declare -A PLATFORM_DRIVER_RULES=(
    ["ipq40xx"]="grep -q 'IPQ4019' /proc/cpuinfo 2>/dev/null && echo 'kmod-phy-qcom-ipq4019-usb'"
    ["mediatek"]="grep -q 'MT7981' /proc/cpuinfo 2>/dev/null && echo 'kmod-usb-dwc3-mediatek'"
)
#【build-config.conf-08-end】

#【build-config.conf-09】
#------------------------------------------------------------------------------
# 第八部分：关键驱动列表（用于验证）
#   构建前会检查这些驱动是否启用，缺失会警告
#------------------------------------------------------------------------------

## 必须启用的核心驱动（构建失败条件）
CRITICAL_USB_DRIVERS=(
    "kmod-usb-core"           # USB核心必须
    "kmod-usb2"               # USB 2.0必须（几乎所有设备都有）
    "kmod-usb-storage"        # 存储功能必须
    "kmod-scsi-core"          # SCSI支持必须
)

## 推荐启用的重要驱动（仅警告）
RECOMMENDED_USB_DRIVERS=(
    "kmod-usb3"               # USB 3.0（如果有）
    "kmod-fs-ext4"            # ext4支持
    "block-mount"             # 挂载工具
    "automount"               # 自动挂载
)
#【build-config.conf-09-end】

#【build-config.conf-10】
#------------------------------------------------------------------------------
# 第九部分：设备名称映射 - 动态生成
#   从support.sh自动获取设备列表，无需手动维护
#   以下配置控制设备映射的生成行为
#------------------------------------------------------------------------------

## 是否启用设备映射动态生成（true/false）
## 设为true时，脚本会从support.sh自动获取支持的设备列表
: ${ENABLE_DYNAMIC_DEVICE_MAPPING:="true"}

## support.sh脚本路径（复用上面的定义）
# SUPPORT_SCRIPT 已在上面定义

## 设备映射缓存文件（用于性能优化）
: ${DEVICE_MAP_CACHE:="/tmp/openwrt-device-map.cache"}

## 是否使用缓存（true/false）
## 启用缓存可提高性能，但添加新设备后需要清除缓存
: ${USE_DEVICE_MAP_CACHE:="true"}

## 缓存有效期（秒），3600秒=1小时
: ${DEVICE_MAP_CACHE_TTL:=3600}
#【build-config.conf-10-end】

#【build-config.conf-11】
#------------------------------------------------------------------------------
# 第十部分：编译参数配置 ##
#   控制编译过程的并行度和资源使用
#   根据你的机器性能调整这些值
#------------------------------------------------------------------------------

##常修改## 高性能系统阈值（CPU核心数）
##常修改## 如果CPU核心数 >= 此值，视为高性能系统
: ${HIGH_PERF_CORES:=4}

##常修改## 高性能系统阈值（内存MB）
##常修改## 如果内存MB >= 此值，视为高性能系统
: ${HIGH_PERF_MEM:=4096}

##常修改## 标准系统阈值（CPU核心数）
: ${STD_PERF_CORES:=2}

##常修改## 标准系统阈值（内存MB）
: ${STD_PERF_MEM:=2048}

##常修改## 高性能系统并行任务数
##常修改## 高性能系统使用的编译并行数
: ${HIGH_PERF_JOBS:=4}

##常修改## 标准系统并行任务数
: ${STD_PERF_JOBS:=3}

##常修改## 低性能系统并行任务数
: ${LOW_PERF_JOBS:=2}

##常修改## 下载时的并行任务数上限
##常修改## 下载依赖包时的并发数
: ${MAX_DOWNLOAD_JOBS:=8}
#【build-config.conf-11-end】

#【build-config.conf-12】
#------------------------------------------------------------------------------
# 第十一部分：功能开关 ##
#   控制是否启用某些功能
#   根据需要开启或关闭
#------------------------------------------------------------------------------

##常修改## 是否启用TurboACC（true/false）
##常修改## normal模式下有效，基础模式忽略
: ${ENABLE_TURBOACC:="true"}

##常修改## 是否启用TCP BBR（true/false）
##常修改## 开启BBR拥塞控制算法
: ${ENABLE_TCP_BBR:="true"}

##常修改## 是否强制使用ath10k-ct驱动（解决冲突）
##常修改## 启用后会禁用标准ath10k，使用ct版
: ${FORCE_ATH10K_CT:="true"}

##常修改## 是否自动修复缺失的USB驱动（true/false）
##常修改## 自动添加缺失的关键USB驱动
: ${AUTO_FIX_USB_DRIVERS:="true"}

##常修改## 是否启用详细日志（true/false）
##常修改## 开启后会在编译时显示更详细的输出
: ${ENABLE_VERBOSE_LOG:="false"}

##常修改## 是否禁用 IPv6（true/false）
##常修改## 禁用所有 IPv6 相关功能和模块，所有源码类型通用
: ${DISABLE_IPV6:="true"}

##常修改## 默认禁用的插件列表（空格分隔）
##常修改## 在构建时会自动禁用这些插件及其相关子包
: ${FORBIDDEN_PACKAGES:="vssr ssr-plus passwall rclone ddns qbittorrent filetransfer"}
#【build-config.conf-12-end】

#【build-config.conf-12.01】
#------------------------------------------------------------------------------
# 第十二部分-A：内置补丁配置
#   格式：一行一个补丁，字段用 "|" 分隔：
#   设备匹配模式|源码类型|分支|补丁名称|补丁描述|执行函数名
#   设备匹配模式使用通配符，例如 *ac42u* 匹配包含 ac42u 的任意设备名
#------------------------------------------------------------------------------
BUILTIN_PATCH_LIST=(
    "*rax3000m*|immortalwrt|*|rax3000m-mt798x|集成MT7981专用闭源无线驱动-根治断连|apply_patch_rax3000m_mt798x"
    "*ac42u*|immortalwrt|*|ac42u-ath10k|更新ath10k无线固件|apply_patch_ac42u_ath10k"
    "*wndr3800*|*|*|wndr3800-led|修复WNDR3800 LED指示灯问题|apply_patch_wndr3800_led"
    "*|*|*|usb-power-fix|修复USB电源管理问题|apply_patch_usb_power_fix"
)
#【build-config.conf-12.01-end】

#【build-config.conf-12.02】
#------------------------------------------------------------------------------
# 第十二部分-B：内置补丁执行函数
#   每个补丁对应一个专用的执行函数
#------------------------------------------------------------------------------

#【build-config.conf-12.02.01】
# 内置补丁执行函数: RAX3000M MT7981 闭源驱动集成（路径二，仅在 mediatek 平台生效）
apply_patch_rax3000m_mt798x() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1

    # ---------- 安全检查：仅在 mediatek 平台执行 ----------
    local current_target=""
    if [ -f "$build_dir/build_env.sh" ]; then
        current_target=$(grep "^export TARGET=" "$build_dir/build_env.sh" | cut -d'"' -f2)
    fi

    if [ "$current_target" != "mediatek" ]; then
        log "ℹ️ 当前目标平台为 '$current_target'，非 mediatek，跳过闭源驱动集成"
        return 0
    fi
    log "✅ 检测到 mediatek 平台，开始集成 MT7981 闭源无线驱动"
    # --------------------------------------------------------
    
    log "====================================================="
    log "🔧 执行补丁: RAX3000M MT7981 闭源驱动集成"
    log "====================================================="
    
    # ---------- 第 1 步：克隆 hanwckf 仓库 ----------
    local src_repo="https://github.com/hanwckf/immortalwrt-mt798x.git"
    local src_branch="openwrt-21.02"
    local src_dir="/tmp/immortalwrt-mt798x-src"
    
    log "📥 克隆 hanwckf/immortalwrt-mt798x 仓库..."
    rm -rf "$src_dir" 2>/dev/null || true
    git clone --depth 1 --single-branch -b "$src_branch" "$src_repo" "$src_dir" || {
        log "❌ 克隆失败，请检查网络连接"
        return 1
    }
    log "  ✅ 仓库克隆完成"
    
    # ---------- 第 2 步：替换无线驱动包 ----------
    log "📦 替换无线驱动 package/kernel/mt76..."
    if [ -d "$src_dir/package/kernel/mt76" ]; then
        # 关键：把备份移出 package 目录，避免构建系统误扫描
        if [ -d "package/kernel/mt76" ]; then
            rm -rf "package/kernel/mt76.bak" 2>/dev/null || true
            mv "package/kernel/mt76" "/tmp/mt76.orig.backup"
            log "  📁 原始 mt76 驱动已备份至 /tmp/mt76.orig.backup"
        fi
        cp -a "$src_dir/package/kernel/mt76" "package/kernel/mt76"
        log "  ✅ 闭源无线驱动已替换"
    else
        log "  ⚠️ 源目录中未找到 mt76 驱动"
    fi
    
    # ---------- 第 3 步：复制有线驱动和加速模块 ----------
    log "📦 复制有线驱动和 HNAT 加速模块 package/mtk..."
    if [ -d "$src_dir/package/mtk" ]; then
        mkdir -p "package/mtk"
        for subdir in "$src_dir/package/mtk/"*/; do
            local sub_name=$(basename "$subdir")
            if [ -d "$subdir" ]; then
                mkdir -p "package/mtk/$sub_name"
                cp -a "$subdir"* "package/mtk/$sub_name/"
                log "  ✅ 复制 package/mtk/$sub_name"
            fi
        done
    else
        log "  ⚠️ 源目录中未找到 package/mtk"
    fi
    
    # ---------- 第 4 步：复制内核补丁 ----------
    log "📦 复制 MT7981 内核补丁..."
    local patch_src="$src_dir/target/linux/mediatek/patches-5.4"
    local patch_dst="target/linux/mediatek/patches-5.4"
    if [ -d "$patch_src" ]; then
        if [ -d "$patch_dst" ]; then
            mv "$patch_dst" "${patch_dst}.bak"
            log "  📁 原始内核补丁已备份"
        fi
        mkdir -p "$patch_dst"
        cp -a "$patch_src/"* "$patch_dst/"
        log "  ✅ 内核补丁已复制（$(ls "$patch_dst" 2>/dev/null | wc -l) 个文件）"
    else
        log "  ⚠️ 源目录中未找到内核补丁"
    fi
    
    # ---------- 第 5 步：添加 MTK 官方 feeds ----------
    log "📦 添加 MTK 官方 feeds..."
    if ! grep -q "mtk_openwrt_feed" feeds.conf.default 2>/dev/null; then
        echo "src-git mtk_openwrt_feed https://git01.mediatek.com/openwrt/feeds/mtk-openwrt-feeds;21.02" >> feeds.conf.default
        log "  ✅ 已添加 MTK 官方 feeds"
    else
        log "  ℹ️ MTK feeds 已存在"
    fi
    
    # ---------- 清理 ----------
    rm -rf "$src_dir"
    
    log "====================================================="
    log "✅ RAX3000M MT7981 闭源驱动集成补丁执行完成"
    log "   刷机后在 LuCI 无线页面看到 'MTK Wi-Fi' 即为成功"
    log "====================================================="
    return 0
}
#【build-config.conf-12.02.01-end】

#【build-config.conf-12.02.02】
# 内置补丁执行函数: AC42U ath10k 固件更新
apply_patch_ac42u_ath10k() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1
    
    log "🔧 执行补丁: AC42U ath10k 固件更新"
    
    # 使用通用函数查找固件目录
    local firmware_dir=$(find_firmware_package_dir "ath10k" "ath10k-ct")
    if [ -z "$firmware_dir" ] || [ ! -d "$firmware_dir" ]; then
        log "⚠️ 未找到 ath10k 固件目录，补丁跳过（不影响编译）"
        return 0
    fi
    
    log "📁 找到固件目录: $firmware_dir"
    
    # 尝试更新 Makefile 下载源
    local makefile="$firmware_dir/Makefile"
    if [ -f "$makefile" ]; then
        cp "$makefile" "$makefile.bak.$(date +%Y%m%d%H%M%S)"
        if grep -q "kvalo/ath10k-firmware" "$makefile"; then
            sed -i 's|kvalo/ath10k-firmware|greearb/ath10k-ct-firmware|g' "$makefile"
            log "  ✅ 已更新 ath10k 固件下载源"
        else
            log "  ℹ️ Makefile 已是其他源，跳过修改"
        fi
    fi
    
    # 预置 CT 固件到 files
    local target_fw_dir="files/lib/firmware/ath10k/QCA9888/hw2.0"
    mkdir -p "$target_fw_dir"
    wget -q -O "$target_fw_dir/firmware-ct.bin" \
        "https://github.com/greearb/ath10k-ct-firmware/raw/master/ct-firmware/IPQ4019/firmware-6-ct-full-community-12.bin" 2>/dev/null || {
        log "⚠️ 自动下载固件失败（可忽略，不影响编译）"
    }
    
    log "✅ AC42U ath10k 固件更新补丁执行完成"
    return 0
}
#【build-config.conf-12.02.02-end】

#【build-config.conf-12.02.03】
# 内置补丁执行函数: WNDR3800 LED 修复
apply_patch_wndr3800_led() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1
    
    log "🔧 执行补丁: WNDR3800 LED 修复"
    
    # 使用通用函数查找设备树文件
    local led_file=$(find_device_tree_file "ath79" "wndr3800")
    if [ -z "$led_file" ] || [ ! -f "$led_file" ]; then
        log "⚠️ 未找到 WNDR3800 的设备树文件，补丁跳过（不影响编译）"
        return 0
    fi
    
    log "📁 找到设备树文件: $led_file"
    cp "$led_file" "$led_file.bak"
    
    # 检查是否已修复
    if grep -q "default-on\|phy0radio" "$led_file"; then
        log "  ℹ️ LED 配置已修改，跳过"
        return 0
    fi
    
    # 修正电源 LED
    if grep -q 'label.*"power"' "$led_file"; then
        sed -i '/label.*"power"/,/};/ s/linux,default-trigger = "none"/linux,default-trigger = "default-on"/g' "$led_file"
        log "  ✅ 已修正电源 LED"
    fi
    
    # 修正无线 LED
    if grep -q 'label.*"wlan"' "$led_file"; then
        sed -i '/label.*"wlan"/,/};/ s/linux,default-trigger = "none"/linux,default-trigger = "phy0radio"/g' "$led_file"
        log "  ✅ 已修正无线 LED"
    else
        log "  ℹ️ 未找到无线 LED 定义"
    fi
    
    log "✅ WNDR3800 LED 修复补丁执行完成"
    return 0
}
#【build-config.conf-12.02.03-end】

#【build-config.conf-12.02.04】
# 内置补丁执行函数: USB 电源管理修复
# 功能：启用 USB 持续供电，修复部分设备挂载 USB 存储时因自动休眠导致掉线的问题
# 适用设备：所有设备，所有源码类型
apply_patch_usb_power_fix() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1
    
    log "🔧 执行补丁: USB 电源管理修复"
    
    # 方案：创建或修改 /etc/hotplug.d/usb/10-usb-power 脚本，禁用 USB 自动挂起
    local hotplug_dir="files/etc/hotplug.d/usb"
    mkdir -p "$hotplug_dir"
    
    cat > "$hotplug_dir/10-usb-power" << 'DISABLE_USB_SUSPEND'
#!/bin/sh
# USB 电源管理修复 - 防止 USB 设备因电源管理自动挂起而断开

[ "$ACTION" = "add" ] || exit 0

# 遍历每个新插入的 USB 设备，禁用电源管理
for dev in /sys/bus/usb/devices/*/power/control; do
    echo "on" > "$dev" 2>/dev/null
done

# 对于存储设备，也关闭自动挂起
for dev in /sys/block/sd*/device/scsi_disk/*/power/control; do
    echo "on" > "$dev" 2>/dev/null
done
DISABLE_USB_SUSPEND

    chmod +x "$hotplug_dir/10-usb-power"
    log "  ✅ 已添加 USB 热插拔脚本，禁用 USB 自动挂起"

    # 另外在 rc.local 中添加启动时也强制关闭电源管理
    local rc_local="files/etc/rc.local"
    if [ ! -f "$rc_local" ]; then
        mkdir -p "$(dirname "$rc_local")"
        echo "#!/bin/sh" > "$rc_local"
        chmod +x "$rc_local"
    fi
    
    if ! grep -q "USB power fix" "$rc_local"; then
        echo "" >> "$rc_local"
        echo "# USB power fix - turn off autosuspend" >> "$rc_local"
        echo "for dev in /sys/bus/usb/devices/*/power/control; do echo on > \$dev 2>/dev/null; done" >> "$rc_local"
        echo "" >> "$rc_local"
        log "  ✅ 已添加 rc.local 开机脚本"
    fi
    
    log "✅ USB 电源管理修复补丁执行完成"
    return 0
}
#【build-config.conf-12.02.04-end】

#【build-config.conf-12.03】
#------------------------------------------------------------------------------
# 第十二部分-C：通用补丁辅助函数
#   供所有内置补丁调用，避免硬编码路径
#------------------------------------------------------------------------------

# 自动查找固件包目录
# 参数：关键词列表（如 ath10k mt76）
# 返回：找到的第一个目录路径（打印到 stdout），无结果返回空
find_firmware_package_dir() {
    local keywords=("$@")
    for keyword in "${keywords[@]}"; do
        # 尝试常见路径
        for dir in "package/firmware/$keyword" "package/firmware/linux-firmware/$keyword"; do
            if [ -d "$dir" ]; then
                echo "$dir"
                return 0
            fi
        done
        # 模糊搜索
        local found=$(find package/firmware -maxdepth 3 -type d -name "*$keyword*" 2>/dev/null | head -1)
        if [ -n "$found" ]; then
            echo "$found"
            return 0
        fi
    done
    return 1
}

# 自动查找设备树文件（用于 DTS/DTSI 修改）
# 参数1：目标平台（如 ath79）
# 参数2：设备关键词（如 wndr3800）
# 返回：找到的文件路径（打印到 stdout），无结果返回空
find_device_tree_file() {
    local target="$1"
    local keyword="$2"
    local search_dir="target/linux/$target"
    if [ ! -d "$search_dir" ]; then
        return 1
    fi
    # 查找 dts/dtsi 文件，支持通配符
    local file=$(find "$search_dir" -type f \( -name "*${keyword}*" -o -name "*${keyword/-/_}*" \) \( -name "*.dts" -o -name "*.dtsi" \) 2>/dev/null | head -1)
    if [ -n "$file" ]; then
        echo "$file"
        return 0
    fi
    return 1
}
#【build-config.conf-12.03-end】

