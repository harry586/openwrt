#【build-config.conf-12.02.03】
# 内置补丁执行函数: USB 电源管理修复
# 功能：启用 USB 持续供电，修复部分设备挂载 USB 存储时因自动休眠导致掉线的问题
# 适用设备：所有设备，所有源码类型
apply_patch_usb_power_fix() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1
    
    log "🔧 执行补丁: USB 电源管理修复"
    
    # 方案：创建或修改 /etc/hotplug.d/usb/10-usb-power 脚本，禁用 USB 自动挂起
    local hotplug_dir="files/etc/hotplug.d/usb"
    mkdir -p "$hotplug_dir"
    
    cat > "$hotplug_dir/10-usb-power" << 'DISABLE_USB_SUSPEND'
#!/bin/sh
# USB 电源管理修复 - 防止 USB 设备因电源管理自动挂起而断开

[ "$ACTION" = "add" ] || exit 0

# 遍历每个新插入的 USB 设备，禁用电源管理
for dev in /sys/bus/usb/devices/*/power/control; do
    echo "on" > "$dev" 2>/dev/null
done

# 对于存储设备，也关闭自动挂起
for dev in /sys/block/sd*/device/scsi_disk/*/power/control; do
    echo "on" > "$dev" 2>/dev/null
done
DISABLE_USB_SUSPEND

    chmod +x "$hotplug_dir/10-usb-power"
    log "  ✅ 已添加 USB 热插拔脚本，禁用 USB 自动挂起"

    # 另外在 rc.local 中添加启动时也强制关闭电源管理
    local rc_local="files/etc/rc.local"
    if [ ! -f "$rc_local" ]; then
        mkdir -p "$(dirname "$rc_local")"
        echo "#!/bin/sh" > "$rc_local"
        chmod +x "$rc_local"
    fi
    
    if ! grep -q "USB power fix" "$rc_local"; then
        echo "" >> "$rc_local"
        echo "# USB power fix - turn off autosuspend" >> "$rc_local"
        echo "for dev in /sys/bus/usb/devices/*/power/control; do echo on > \$dev 2>/dev/null; done" >> "$rc_local"
        echo "" >> "$rc_local"
        log "  ✅ 已添加 rc.local 开机脚本"
    fi
    
    log "✅ USB 电源管理修复补丁执行完成"
    return 0
}
#【build-config.conf-12.02.03-end】

#【build-config.conf-12.02.04】
# 内置补丁执行函数: 禁用samba4并启用ksmbd
apply_patch_disable_samba4_enable_ksmbd() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1
    
    log "🔧 执行补丁: 禁用samba4并启用ksmbd"
    
    # 1. 在 .config 中禁用 samba4 相关配置
    if [ -f ".config" ]; then
        sed -i '/CONFIG_PACKAGE_samba4/d' .config
        sed -i '/CONFIG_PACKAGE_luci-app-samba4/d' .config
        sed -i '/CONFIG_PACKAGE_wsdd2/d' .config
        sed -i '/CONFIG_PACKAGE_luci-i18n-samba4/d' .config
        echo "# CONFIG_PACKAGE_samba4-server is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-samba4 is not set" >> .config
        echo "# CONFIG_PACKAGE_wsdd2 is not set" >> .config
        log "  ✅ 已禁用 samba4 相关包"
    fi
    
    # 2. 添加 ksmbd 配置到 .config
    if [ -f ".config" ]; then
        echo "CONFIG_PACKAGE_kmod-fs-ksmbd=y" >> .config
        echo "CONFIG_PACKAGE_ksmbd-tools=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ksmbd=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-ksmbd-zh-cn=y" >> .config
