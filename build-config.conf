#------------------------------------------------------------------------------
# 第十二部分-A：内置补丁配置
#   定义系统内置的补丁，包括适用设备、源码类型、分支等
#   格式: declare -A BUILTIN_PATCH_MAP
#   key="设备匹配模式|源码类型|分支"
#   value="补丁名称|补丁描述|执行函数名"
#------------------------------------------------------------------------------

# 初始化内置补丁映射表
declare -A BUILTIN_PATCH_MAP

# 内置补丁1: RAX3000M 设备 mt76 驱动修复 (仅 immortalwrt 源码)
BUILTIN_PATCH_MAP["cmcc_rax3000m*|immortalwrt|*"]="rax3000m-mt76|修复MT798x无线驱动Message timeout问题|apply_patch_rax3000m_mt76"

# 内置补丁2: AC42U 设备 ath10k 固件更新 (仅 immortalwrt 源码)
BUILTIN_PATCH_MAP["ac42u*|immortalwrt|*"]="ac42u-ath10k|更新ath10k无线固件|apply_patch_ac42u_ath10k"

# 内置补丁3: WNDR3800 设备 LED 补丁 (所有源码类型)
BUILTIN_PATCH_MAP["wndr3800*|*|*"]="wndr3800-led|修复WNDR3800 LED指示灯问题|apply_patch_wndr3800_led"

# 内置补丁4: 通用 USB 电源管理补丁 (所有源码类型)
BUILTIN_PATCH_MAP["*|*|*"]="usb-power-fix|修复USB电源管理问题|apply_patch_usb_power_fix"
#【build-config.conf-12.01-end】

