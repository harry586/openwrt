#【build-config.conf-11-end】

#【build-config.conf-12】
#------------------------------------------------------------------------------
# 第十一部分：功能开关 ##
#   控制是否启用某些功能
#   根据需要开启或关闭
#------------------------------------------------------------------------------

##常修改## 是否启用TurboACC（true/false）
##常修改## normal模式下有效，基础模式忽略
: ${ENABLE_TURBOACC:="true"}

##常修改## 是否启用TCP BBR（true/false）
##常修改## 开启BBR拥塞控制算法
: ${ENABLE_TCP_BBR:="true"}

##常修改## 是否强制使用ath10k-ct驱动（解决冲突）
##常修改## 启用后会禁用标准ath10k，使用ct版
