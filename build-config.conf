#【build-config.conf-12.01】
#------------------------------------------------------------------------------
# 第十二部分-A：内置补丁配置
#   格式：一行一个补丁，字段用 "|" 分隔：
#   设备匹配模式|源码类型|分支|补丁名称|补丁描述|执行函数名
#   设备匹配模式使用通配符，例如 *ac42u* 匹配包含 ac42u 的任意设备名
#------------------------------------------------------------------------------
BUILTIN_PATCH_LIST=(
    "*rax3000m*|immortalwrt|*|rax3000m-mt76|修复MT798x无线驱动Message timeout问题|apply_patch_rax3000m_mt76"
    "*ac42u*|immortalwrt|*|ac42u-ath10k|更新ath10k无线固件|apply_patch_ac42u_ath10k"
    "*wndr3800*|*|*|wndr3800-led|修复WNDR3800 LED指示灯问题|apply_patch_wndr3800_led"
    "*|*|*|usb-power-fix|修复USB电源管理问题|apply_patch_usb_power_fix"
)
#【build-config.conf-12.01-end】

#【build-config.conf-12.02】
#------------------------------------------------------------------------------
# 第十二部分-B：内置补丁执行函数
#   每个补丁对应一个专用的执行函数
#------------------------------------------------------------------------------

#【build-config.conf-12.02.01】
# 内置补丁执行函数: RAX3000M mt76 驱动更新
apply_patch_rax3000m_mt76() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1
    
    log "🔧 执行补丁: RAX3000M mt76 驱动更新"
    
    if [ ! -d "package/kernel/mt76" ]; then
        log "⚠️ 未找到 package/kernel/mt76 目录，跳过补丁"
        return 0
    fi
    
    log "🔧 拉取最新 mt76 驱动代码..."
    cd package/kernel/mt76
    
    git fetch origin || {
        log "⚠️ git fetch 失败，继续"
        cd "$build_dir"
        return 0
    }
    
    local target_branch="${SELECTED_BRANCH:-openwrt-23.05}"
    local branch_found=0
    if git rev-parse --verify "origin/$target_branch" >/dev/null 2>&1; then
        log "  ✅ 使用分支: $target_branch"
        git checkout -B "$target_branch" "origin/$target_branch" && branch_found=1
    fi
    
    if [ $branch_found -eq 0 ]; then
        if git rev-parse --verify "origin/main" >/dev/null 2>&1; then
            log "  ✅ 使用分支: main"
            git checkout -B main origin/main && branch_found=1
        fi
    fi
    
    if [ $branch_found -eq 0 ]; then
        if git rev-parse --verify "origin/master" >/dev/null 2>&1; then
            log "  ✅ 使用分支: master"
            git checkout -B master origin/master && branch_found=1
        fi
    fi
    
    if [ $branch_found -eq 0 ]; then
        log "⚠️ 无法找到可用的远程分支，跳过补丁"
        cd "$build_dir"
        return 0
    fi
    
    cd "$build_dir"
    
    log "✅ mt76 源码已通过 git 更新到最新分支，无需额外下载"
    log "✅ RAX3000M mt76 驱动补丁执行完成"
    return 0
}
#【build-config.conf-12.02.01-end】

#【build-config.conf-12.02.02】
# 内置补丁执行函数: AC42U ath10k 固件更新
# 功能：替换 ath10k 无线固件为更新版本，修复 WPA3/高密场景连接问题
# 适用设备：华硕 AC42U（IPQ40xx 平台），仅对 immortalwrt 源码生效
apply_patch_ac42u_ath10k() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1
    
    log "🔧 执行补丁: AC42U ath10k 固件更新"
    
    # 检查必要目录
    local firmware_dir="package/firmware/ath10k-firmware"
    if [ ! -d "$firmware_dir" ]; then
        log "⚠️ 未找到 ath10k 固件目录 ($firmware_dir)，跳过补丁"
        return 0
    fi
    
    log "📥 下载更新的 ath10k 固件..."
    
    # 备份原固件定义文件
    local makefile_path="$firmware_dir/Makefile"
    if [ -f "$makefile_path" ]; then
        cp "$makefile_path" "$makefile_path.bak.$(date +%Y%m%d%H%M%S)"
    fi
    
    # 方法：更新固件下载源或直接替换本地固件文件
    # 此示例使用 candelatech 的优化版固件（更稳定），也可换成其他可靠源
    # 注意：固件文件必须与内核版本和 ath10k-ct 驱动兼容
    sed -i 's|https://github.com/kvalo/ath10k-firmware/raw/master/QCA9888/|https://github.com/greearb/ath10k-ct-firmware/raw/master/ct-firmware/IPQ4019/|g' "$makefile_path" 2>/dev/null || true
    
    # 或者直接下载并替换固件文件（如果上面的 sed 不生效）
    # 这里采用备选方案：在 files/etc 目录放入预置的固件
    local custom_fw_dir="files/lib/firmware/ath10k/QCA9888/hw2.0"
    mkdir -p "$custom_fw_dir"
    # 下载 candelatech 的 CT 固件（示例版本，实际需要选择合适的版本）
    wget -q -O "$custom_fw_dir/firmware-ct.bin" \
        "https://github.com/greearb/ath10k-ct-firmware/raw/master/ct-firmware/IPQ4019/firmware-6-ct-full-community-12.bin" 2>/dev/null || {
        log "⚠️ 自动下载固件失败，将使用源码自带固件（补丁已跳过）"
        return 0
    }
    
    # 确保固件文件被正确引用（通常不需要额外操作，OpenWrt 会自动加载）
    log "✅ AC42U ath10k 固件更新补丁执行完成"
    return 0
}
#【build-config.conf-12.02.02-end】

#【build-config.conf-12.02.03】
# 内置补丁执行函数: WNDR3800 LED 修复
# 功能：修复 WNDR3800 的电源/无线 LED 指示灯不亮或状态异常问题
# 适用设备：Netgear WNDR3800（ath79 平台），所有源码类型
apply_patch_wndr3800_led() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1
    
    log "🔧 执行补丁: WNDR3800 LED 修复"
    
    local target_dir="target/linux/ath79/dts"
    local dts_file="$target_dir/netgear_wndr3800.dts"
    local dtsi_file="$target_dir/netgear_wndr3800.dtsi"
    
    # 优先修改 .dts 文件，如果不存在则尝试 .dtsi
    local led_file=""
    if [ -f "$dts_file" ]; then
        led_file="$dts_file"
    elif [ -f "$dtsi_file" ]; then
        led_file="$dtsi_file"
    else
        log "⚠️ 未找到 WNDR3800 的设备树文件，跳过补丁"
        return 0
    fi
    
    cp "$led_file" "$led_file.bak"
    
    log "🔧 修正 LED GPIO 定义..."
    # 常见的修复：将电源 LED 的默认状态改为 on，并将无线 LED 的触发器改为 phy0radio
    # 以下 sed 替换是实例，实际需要根据当前 dts 内容调整
    
    # 1. 将电源 LED 默认状态改为 "on"
    sed -i '/label = "power"/,/};/ s/linux,default-trigger = "none"/linux,default-trigger = "default-on"/g' "$led_file"
    sed -i '/label = "power"/,/};/ s/linux,default-trigger = "default-on"/linux,default-trigger = "default-on"/g' "$led_file"  # 确保不重复替换
    
    # 2. 将无线 LED 触发器改为 phy0radio（如果存在）
    sed -i '/label = "wlan"/,/};/ s/linux,default-trigger = "none"/linux,default-trigger = "phy0radio"/g' "$led_file"
    
    # 3. 如果缺少无线 LED 定义，尝试添加（这里简单处理，只做输出提示）
    if ! grep -q "label = \"wlan\"" "$led_file"; then
        log "  ℹ️ 未找到无线 LED 定义，将不影响固件生成。如需自定义，请手动修改 $led_file"
    fi
    
    log "✅ WNDR3800 LED 修复补丁执行完成"
    return 0
}
#【build-config.conf-12.02.03-end】

#【build-config.conf-12.02.04】
# 内置补丁执行函数: USB 电源管理修复
# 功能：启用 USB 持续供电，修复部分设备挂载 USB 存储时因自动休眠导致掉线的问题
# 适用设备：所有设备，所有源码类型
apply_patch_usb_power_fix() {
    local build_dir="$1"
    local device="$2"
    
    cd "$build_dir" || return 1
    
    log "🔧 执行补丁: USB 电源管理修复"
    
    # 方案：创建或修改 /etc/hotplug.d/usb/10-usb-power 脚本，禁用 USB 自动挂起
    local hotplug_dir="files/etc/hotplug.d/usb"
    mkdir -p "$hotplug_dir"
    
    cat > "$hotplug_dir/10-usb-power" << 'DISABLE_USB_SUSPEND'
#!/bin/sh
# USB 电源管理修复 - 防止 USB 设备因电源管理自动挂起而断开

[ "$ACTION" = "add" ] || exit 0

# 遍历每个新插入的 USB 设备，禁用电源管理
for dev in /sys/bus/usb/devices/*/power/control; do
    echo "on" > "$dev" 2>/dev/null
done

# 对于存储设备，也关闭自动挂起
for dev in /sys/block/sd*/device/scsi_disk/*/power/control; do
    echo "on" > "$dev" 2>/dev/null
done
DISABLE_USB_SUSPEND

    chmod +x "$hotplug_dir/10-usb-power"
    log "  ✅ 已添加 USB 热插拔脚本，禁用 USB 自动挂起"

    # 另外在 rc.local 中添加启动时也强制关闭电源管理
    local rc_local="files/etc/rc.local"
    if [ ! -f "$rc_local" ]; then
        mkdir -p "$(dirname "$rc_local")"
        echo "#!/bin/sh" > "$rc_local"
        chmod +x "$rc_local"
    fi
    
    if ! grep -q "USB power fix" "$rc_local"; then
        echo "" >> "$rc_local"
        echo "# USB power fix - turn off autosuspend" >> "$rc_local"
        echo "for dev in /sys/bus/usb/devices/*/power/control; do echo on > \$dev 2>/dev/null; done" >> "$rc_local"
        echo "" >> "$rc_local"
        log "  ✅ 已添加 rc.local 开机脚本"
    fi
    
    log "✅ USB 电源管理修复补丁执行完成"
    return 0
}
#【build-config.conf-12.02.04-end】

