#------------------------------------------------------------------------------
# 第十二部分-C：补丁匹配函数
#   根据设备名、源码类型、分支匹配应该应用的内置补丁
#------------------------------------------------------------------------------
match_builtin_patches() {
    local device_name="$1"
    local source_type="$2"
    local branch="$3"
    
    local matched_patches=()
    
    # 遍历所有内置补丁，检查是否匹配
    for key in "${!BUILTIN_PATCH_MAP[@]}"; do
        # 解析 key: "设备模式|源码类型|分支"
        IFS='|' read -r device_pattern source_pattern branch_pattern <<< "$key"
        
        # 检查设备名匹配
        local device_match=0
        if [[ "$device_pattern" == "*" ]]; then
            device_match=1
        elif [[ "$device_name" == $device_pattern ]]; then
            device_match=1
        fi
        
        # 检查源码类型匹配
        local source_match=0
        if [[ "$source_pattern" == "*" ]]; then
            source_match=1
        elif [[ "$source_type" == "$source_pattern" ]]; then
            source_match=1
        fi
        
        # 检查分支匹配
        local branch_match=0
        if [[ "$branch_pattern" == "*" ]]; then
            branch_match=1
        elif [[ "$branch" == "$branch_pattern" ]]; then
            branch_match=1
        fi
        
        # 三个条件都匹配
        if [ $device_match -eq 1 ] && [ $source_match -eq 1 ] && [ $branch_match -eq 1 ]; then
            # 解析 value: "补丁名|描述|函数名"
            IFS='|' read -r patch_name patch_desc patch_func <<< "${BUILTIN_PATCH_MAP[$key]}"
            matched_patches+=("$patch_name:$patch_desc:$patch_func")
        fi
    done
    
    # 输出匹配的补丁列表
    if [ ${#matched_patches[@]} -gt 0 ]; then
        printf '%s\n' "${matched_patches[@]}"
    fi
}
#【build-config.conf-12.03-end】

#【build-config.conf-12.04】
#------------------------------------------------------------------------------
# 第十二部分-D：补丁选择验证函数
#   验证工作流传入的补丁选择是否与当前设备兼容
#------------------------------------------------------------------------------
validate_patch_selection() {
    local selected_patch="$1"
    local device_name="$2"
    local source_type="$3"
    local branch="$4"
    
    # 如果是自定义补丁，直接返回成功
    if [[ "$selected_patch" == custom:* ]]; then
        echo "custom"
        return 0
    fi
    
    # 检查是否在内置补丁列表中
    for key in "${!BUILTIN_PATCH_MAP[@]}"; do
        IFS='|' read -r device_pattern source_pattern branch_pattern <<< "$key"
        IFS='|' read -r patch_name patch_desc patch_func <<< "${BUILTIN_PATCH_MAP[$key]}"
        
        if [ "$patch_name" = "$selected_patch" ]; then
            # 检查设备兼容性
            if [[ "$device_pattern" != "*" ]]; then
                if ! [[ "$device_name" == $device_pattern ]]; then
                    echo "❌ 错误: 补丁 '$selected_patch' 不适用于设备 '$device_name'"
                    echo "   补丁要求设备模式: $device_pattern"
                    return 1
                fi
            fi
            
            # 检查源码兼容性
            if [[ "$source_pattern" != "*" ]]; then
                if [ "$source_type" != "$source_pattern" ]; then
                    echo "❌ 错误: 补丁 '$selected_patch' 不适用于源码类型 '$source_type'"
                    echo "   补丁要求源码类型: $source_pattern"
                    return 1
                fi
            fi
            
            echo "✅ 补丁验证通过: $selected_patch"
            return 0
        fi
    done
    
    echo "❌ 错误: 未找到名为 '$selected_patch' 的内置补丁"
    return 1
}
#【build-config.conf-12.04-end】
