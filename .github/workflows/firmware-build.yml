#【firmware-build.yml-00】
# OpenWrt 智能固件构建工作流 - 系统主入口
# 版本: 3.6.0
# 最后更新: 2026-04-28

name: OpenWrt 智能固件构建工作流

on:
  workflow_dispatch:
    inputs:
      # 源码仓库选择
      source_repo:
        description: "📦 源码仓库选择"
        required: true
        type: choice
        default: "immortalwrt"
        options: ["immortalwrt", "openwrt", "lede"]

      # 版本选择
      version_selection:
        description: "🔄 版本选择"
        required: true
        type: choice
        default: "21.02"
        options: ["23.05", "21.02"]
      # 配置模式
      config_mode:
        description: "⚙️ 配置模式选择"
        required: true
        type: choice
        default: "normal"
        options: ["base", "normal"]

      # 预定义设备
      device_name:
        description: "📱 预定义设备（下拉选择）"
        required: false
        type: choice
        default: "ac42u"
        options: ["ac42u", "cmcc_rax3000m-nand", "netgear_wndr3800"]

      # 补丁选择方式（显示中文）
      patch_method:
        description: "🔧 补丁选择方式"
        required: true
        type: choice
        default: "不应用补丁"
        options:
          - "不应用补丁"                 # none
          - "单选内置补丁"               # single
          - "手动输入多个内置补丁"       # custom-list
          - "自定义补丁命令"             # custom-command

      # 单个内置补丁（当选择“单选内置补丁”时生效）
      builtin_patch_single:
        description: "📌 选择单个内置补丁"
        required: false
        type: choice
        default: "none"
        options:
          - "none"              # 不选择
          - "rax3000m-mt76"     # RAX3000M - MT76驱动修复
          - "ac42u-ath10k"      # AC42U - ATH10K固件更新
          - "wndr3800-led"      # WNDR3800 - LED修复

      # 多个内置补丁（当选择“手动输入多个内置补丁”时生效）
      builtin_patch_list:
        description: "📋 多个内置补丁（逗号分隔，可用补丁：rax3000m-mt76, ac42u-ath10k, wndr3800-led）"
        required: false
        type: string
        default: ""

      # 自定义补丁命令（当选择“自定义补丁命令”时生效）
      custom_patch_command:
        description: "📝 自定义补丁命令（每行一条命令，支持#注释）"
        required: false
        type: string
        default: ""

      # 手动输入框
      manual_device_name:
        description: "📝 设备名称（使用自定义）"
        required: false
        type: string
        default: ""
      manual_target:
        description: "🎯 芯片型号（ipq40xx、mediatek）"
        required: false
        type: string
        default: ""
      manual_subtarget:
        description: "🔧 子平台（generic、filogic）"
        required: false
        type: string
        default: ""

      # 自定义禁用插件
      forbidden_packages:
        description: "🚫 自定义禁用插件 - 格式：用空格分隔，默认禁用 vssr ssr-plus passwall rclone ddns qbittorrent filetransfer"
        required: false
        type: string
        default: "vssr ssr-plus passwall rclone ddns qbittorrent filetransfer"

      # 额外安装插件
      extra_packages:
        description: "额外安装插件 - 格式：用分号;分隔"
        required: false
        type: string
        default: ""

      # 启用智能并行优化
      enable_parallel:
        description: "⚡ 启用智能并行优化"
        required: false
        type: boolean
        default: true

env:
  BUILD_DIR: "/mnt/openwrt-build"
  REPO_ROOT: "${{ github.workspace }}"
  ENABLE_PARALLEL: "${{ github.event.inputs.enable_parallel }}"
  SOURCE_REPO: "${{ github.event.inputs.source_repo }}"
  FORBIDDEN_PACKAGES: "${{ github.event.inputs.forbidden_packages }}"
  PATCH_METHOD: "${{ github.event.inputs.patch_method }}"
  BUILTIN_PATCH_SINGLE: "${{ github.event.inputs.builtin_patch_single }}"
  BUILTIN_PATCH_LIST: "${{ github.event.inputs.builtin_patch_list }}"
  CUSTOM_PATCH_COMMAND: "${{ github.event.inputs.custom_patch_command }}"
#【firmware-build.yml-00-end】

jobs:
  build-firmware:
    runs-on: ubuntu-22.04

    steps:
#【firmware-build.yml-01】
      - name: "01. 生成时间戳（UTC+8时区）"
        run: |
          echo "=== 步骤01: 生成时间戳（UTC+8时区） ==="
          
          sudo timedatectl set-timezone Asia/Shanghai 2>/dev/null || true
          
          START_TIME=$(date +'%Y-%m-%d %H:%M:%S')
          echo "🕐 开始时间: $START_TIME"
          
          # 确定最终使用的设备名称
          if [ -n "${{ github.event.inputs.manual_device_name }}" ]; then
            FINAL_DEVICE_NAME="${{ github.event.inputs.manual_device_name }}"
          else
            FINAL_DEVICE_NAME="${{ github.event.inputs.device_name }}"
          fi
          
          # 获取源码名称
          SOURCE_REPO_NAME="${{ github.event.inputs.source_repo }}"
          
          TIMESTAMP_LOCAL=$(date +'%Y%m%d_%H%M%S')
          TIMESTAMP_SEC="${SOURCE_REPO_NAME}-${FINAL_DEVICE_NAME}-${{ github.event.inputs.version_selection }}-${{ github.event.inputs.config_mode }}-${TIMESTAMP_LOCAL}"
          
          echo "TIMESTAMP_SEC=$TIMESTAMP_SEC" >> $GITHUB_ENV
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          echo "FINAL_DEVICE_NAME=$FINAL_DEVICE_NAME" >> $GITHUB_ENV
          echo "SOURCE_REPO_NAME=$SOURCE_REPO_NAME" >> $GITHUB_ENV
          
          echo "✅ 生成时间戳: $TIMESTAMP_SEC"
          echo "📋 构建配置:"
          echo "  源码类型: $SOURCE_REPO_NAME"
          echo "  预定义设备: ${{ github.event.inputs.device_name }}"
          echo "  手动设备名: ${{ github.event.inputs.manual_device_name }}"
          echo "  最终设备名: $FINAL_DEVICE_NAME"
          echo "  手动芯片型号: ${{ github.event.inputs.manual_target }}"
          echo "  手动子平台: ${{ github.event.inputs.manual_subtarget }}"
          echo "  版本: ${{ github.event.inputs.version_selection }}"
          echo "  模式: ${{ github.event.inputs.config_mode }}"
          echo "  并行优化: ${{ github.event.inputs.enable_parallel }}"
          echo "  补丁方式: ${{ github.event.inputs.patch_method }}"
#【firmware-build.yml-01-end】

      #【firmware-build.yml-02】
      - name: "02. 使用Git Archive API下载源代码"
        run: |
          echo "=== 步骤02: 使用Git Archive API下载源代码 ==="
          
          set -e
          trap 'echo "❌ 步骤02 失败，退出代码: $?"; exit 1' ERR
          
          mkdir -p /tmp/openwrt-source
          cd /tmp/openwrt-source
          
          echo "🔍 获取仓库默认分支..."
          DEFAULT_BRANCH=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}" | jq -r '.default_branch')
          echo "✅ 默认分支: $DEFAULT_BRANCH"
          
          echo "📥 下载源代码压缩包..."
          curl -s -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/tarball/$DEFAULT_BRANCH" \
            -o source.tar.gz
          
          if [ ! -f "source.tar.gz" ]; then
            echo "❌ 错误: 下载源代码压缩包失败"
            exit 1
          fi
          
          echo "✅ 下载完成，文件大小: $(ls -lh source.tar.gz | awk '{print $5}')"
          
          echo "📦 解压源代码..."
          tar -xzf source.tar.gz --strip-components=1
          
          echo "🔍 检查解压结果..."
          if [ -f "firmware-config/scripts/build_firmware_main.sh" ]; then
            echo "✅ 源代码解压成功"
            echo "✅ 主脚本存在: firmware-config/scripts/build_firmware_main.sh"
            
            echo "📁 复制文件到工作区..."
            mkdir -p ${{ github.workspace }}
            
            if [ -d "firmware-config/build-Compiler-file" ]; then
              echo "⚠️ 发现编译器目录，排除不复制"
              rm -rf firmware-config/build-Compiler-file
            fi
            
            rsync -av --exclude='.git' . ${{ github.workspace }}/
            
            echo "✅ 文件复制完成"
            
            mkdir -p /tmp/build-artifacts/source-archive
            cp source.tar.gz /tmp/build-artifacts/source-archive/
            echo "📦 源代码已保存到: /tmp/build-artifacts/source-archive/"
          else
            echo "❌ 错误: 源代码解压失败，重要文件缺失"
            ls -la
            exit 1
          fi
          
          cd /tmp
          rm -rf openwrt-source
          echo "✅ 步骤02 完成"
      #【firmware-build.yml-02-end】

#【firmware-build.yml-03】
      - name: "03. 上传源代码Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: source-${{ env.TIMESTAMP_SEC }}
          path: /tmp/build-artifacts/source-archive/
          retention-days: 7
          if-no-files-found: error
#【firmware-build.yml-03-end】

      #【firmware-build.yml-04】
      - name: "04. 修复权限问题"
        run: |
          echo "=== 步骤04: 修复权限问题 ==="
          
          set -e
          trap 'echo "❌ 步骤04 失败，退出代码: $?"; exit 1' ERR
          
          echo "🔧 修复所有脚本的执行权限..."
          
          if [ -f "${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh" ]; then
            chmod +x "${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh"
            echo "✅ 修复主脚本权限"
          else
            echo "❌ 错误: 主脚本不存在"
            exit 1
          fi
          
          if [ -f "${{ github.workspace }}/support.sh" ]; then
            chmod +x "${{ github.workspace }}/support.sh"
            echo "✅ 修复support.sh权限"
          else
            echo "❌ 错误: support.sh不存在"
            exit 1
          fi
          
          find "${{ github.workspace }}/firmware-config/scripts" -name "*.sh" -exec chmod +x {} \;
          echo "✅ 修复所有脚本权限完成"
      #【firmware-build.yml-04-end】

#【firmware-build.yml-05】
      - name: "05. 安装基础工具（优化版 - 包含所有关键依赖）"
        run: |
          echo "=== 步骤05: 安装基础工具（优化版 - 包含所有关键依赖） ==="
          
          # 更新软件源
          sudo apt-get update
          
          # 安装所有关键依赖
          sudo apt-get install -y \
            build-essential \
            libyaml-dev \
            libyaml-cpp-dev \
            libssl-dev \
            libxml2-dev \
            libxslt1-dev \
            libuv1-dev \
            libidn11-dev \
            libidn2-dev \
            libpsl-dev \
            libnghttp2-dev \
            libcap-dev \
            libcap-ng-dev \
            libmnl-dev \
            libnftnl-dev \
            uuid-dev \
            || true
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step05_install_basic_tools
#【firmware-build.yml-05-end】

      #【firmware-build.yml-06】
      - name: "06. 初始空间检查"
        run: |
          echo "=== 步骤06: 初始空间检查 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step06_initial_space_check
      #【firmware-build.yml-06-end】

      #【firmware-build.yml-07】
      - name: "07. 创建构建目录"
        run: |
          echo "=== 步骤07: 创建构建目录 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step07_create_build_dir
      #【firmware-build.yml-07-end】

      #【firmware-build.yml-08】
      - name: "08. 初始化构建环境（混合模式：优先使用手动输入）"
        run: |
          echo "=== 步骤08: 初始化构建环境（混合模式） ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step08_initialize_build_env_hybrid \
            "$FINAL_DEVICE_NAME" \
            "${{ github.event.inputs.version_selection }}" \
            "${{ github.event.inputs.config_mode }}" \
            "${{ github.event.inputs.manual_target }}" \
            "${{ github.event.inputs.manual_subtarget }}"
      #【firmware-build.yml-08-end】

#【firmware-build.yml-08.5】
      - name: "8.5. 执行设备补丁"
        run: |
          echo "=== 步骤8.5: 执行设备补丁 ==="
          
          PATCH_METHOD="${{ github.event.inputs.patch_method }}"
          echo "补丁方式: $PATCH_METHOD"
          
          if [ -f "/mnt/openwrt-build/build_env.sh" ]; then
            source /mnt/openwrt-build/build_env.sh
            echo "当前设备: $DEVICE"
            echo "源码类型: $SOURCE_REPO_TYPE"
            echo "分支: $SELECTED_BRANCH"
          else
            echo "⚠️ 环境文件不存在，使用工作流参数"
            DEVICE="$FINAL_DEVICE_NAME"
            SOURCE_REPO_TYPE="${{ github.event.inputs.source_repo }}"
            SELECTED_BRANCH="${{ github.event.inputs.version_selection }}"
          fi
          
          # 将中文选项映射为内部英文标识
          case "$PATCH_METHOD" in
            "不应用补丁")
              PATCH_ARG="none"
              EXTRA_ARG=""
              ;;
            "单选内置补丁")
              PATCH_ARG="${{ github.event.inputs.builtin_patch_single }}"
              EXTRA_ARG=""
              ;;
            "手动输入多个内置补丁")
              PATCH_ARG="custom-list"
              EXTRA_ARG="${{ github.event.inputs.builtin_patch_list }}"
              ;;
            "自定义补丁命令")
              CUSTOM_CMD_FILE="/tmp/custom_patch_commands.sh"
              printf '%s\n' "${{ github.event.inputs.custom_patch_command }}" > "$CUSTOM_CMD_FILE"
              PATCH_ARG="custom"
              EXTRA_ARG="$CUSTOM_CMD_FILE"
              ;;
            *)
              echo "❌ 未知补丁方式: $PATCH_METHOD"
              exit 1
              ;;
          esac
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            execute_patches \
            "$PATCH_ARG" \
            "$DEVICE" \
            "$SOURCE_REPO_TYPE" \
            "$SELECTED_BRANCH" \
            "$EXTRA_ARG"
#【firmware-build.yml-08.5-end】

      #【firmware-build.yml-09】
      - name: "09. 添加TurboACC支持"
        run: |
          echo "=== 步骤09: 添加TurboACC支持 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step11_add_turboacc
      #【firmware-build.yml-09-end】

      #【firmware-build.yml-10】
      - name: "10. 配置Feeds"
        run: |
          echo "=== 步骤10: 配置Feeds ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step12_configure_feeds
      #【firmware-build.yml-10-end】

      #【firmware-build.yml-11】
      - name: "11. 安装TurboACC包"
        if: github.event.inputs.config_mode == 'normal'
        run: |
          echo "=== 步骤11: 安装TurboACC包 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step13_install_turboacc
      #【firmware-build.yml-11-end】

      #【firmware-build.yml-12】
      - name: "12. 智能配置生成【修复版】"
        run: |
          echo "=== 步骤12: 智能配置生成【修复版】 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step15_generate_config \
            "${{ github.event.inputs.extra_packages }}"
      #【firmware-build.yml-12-end】

      #【firmware-build.yml-13】
      - name: "13. 验证USB配置"
        run: |
          echo "=== 步骤13: 验证USB配置 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step16_verify_usb
      #【firmware-build.yml-13-end】

      #【firmware-build.yml-14】
      - name: "14. USB驱动完整性检查"
        run: |
          echo "=== 步骤14: USB驱动完整性检查 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step17_check_usb_drivers
      #【firmware-build.yml-14-end】

      #【firmware-build.yml-15】
      - name: "15. 应用配置并显示详细信息"
        run: |
          echo "=== 步骤15: 应用配置并显示详细信息 ==="
          
          set -e
          trap 'echo "❌ 步骤15 失败，退出代码: $?"; exit 1' ERR
          
          cd /mnt/openwrt-build
          
          echo "🔄 调用主脚本的 apply_config 函数..."
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            apply_config
          
          echo "✅ 步骤15 完成"
      #【firmware-build.yml-15-end】

      #【firmware-build.yml-16】
      - name: "16. 备份配置文件"
        run: |
          echo "=== 步骤16: 备份配置文件 ==="
          
          set -e
          trap 'echo "❌ 步骤16 失败，退出代码: $?"; exit 1' ERR
          
          cd /mnt/openwrt-build
          
          if [ ! -f ".config" ]; then
            echo "❌ 错误: .config 文件不存在"
            exit 1
          fi
          
          echo "✅ .config 文件存在"
          echo "📊 文件大小: $(ls -lh .config | awk '{print $5}')"
          echo "📝 文件行数: $(wc -l < .config)"
          
          mkdir -p ${{ github.workspace }}/firmware-config/config-backup
          BACKUP_FILE="${{ github.workspace }}/firmware-config/config-backup/config_${{ env.TIMESTAMP_SEC }}.config"
          
          cp .config "$BACKUP_FILE"
          echo "✅ 配置文件已备份到: $BACKUP_FILE"
      #【firmware-build.yml-16-end】

      #【firmware-build.yml-17】
      - name: "17. 修复网络环境"
        run: |
          echo "=== 步骤17: 修复网络环境 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step20_fix_network
      #【firmware-build.yml-17-end】

      #【firmware-build.yml-18】
      - name: "18. 下载依赖包"
        run: |
          echo "=== 步骤18: 下载依赖包 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step21_download_deps
      #【firmware-build.yml-18-end】

      #【firmware-build.yml-19】
      - name: "19. 集成自定义文件"
        run: |
          echo "=== 步骤19: 集成自定义文件 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step22_integrate_custom_files
      #【firmware-build.yml-19-end】

      #【firmware-build.yml-20】
      - name: "20. 前置错误检查"
        run: |
          echo "=== 步骤20: 前置错误检查 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step23_pre_build_check
      #【firmware-build.yml-20-end】

      #【firmware-build.yml-21】
      - name: "21. 编译源码自带工具链"
        run: |
          echo "=== 步骤21: 编译源码自带工具链 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step09_download_sdk \
            "$FINAL_DEVICE_NAME"
      #【firmware-build.yml-21-end】

      #【firmware-build.yml-22】
      - name: "22. 验证工具链编译结果"
        run: |
          echo "=== 步骤22: 验证工具链编译结果 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step10_verify_sdk
      #【firmware-build.yml-22-end】

      #【firmware-build.yml-23】
      - name: "23. 编译前空间检查"
        run: |
          echo "=== 步骤23: 编译前空间检查 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step14_pre_build_space_check
          
          AVAILABLE_SPACE=$(df /mnt --output=avail | tail -1 | awk '{print $1}')
          AVAILABLE_GB=$((AVAILABLE_SPACE / 1024 / 1024))
          if [ $AVAILABLE_GB -lt 10 ]; then
            echo "❌ 错误: 编译前空间不足 (需要至少10G，当前${AVAILABLE_GB}G)"
            exit 1
          fi
      #【firmware-build.yml-23-end】

      #【firmware-build.yml-24】
      - name: "24. 编译固件"
        run: |
          echo "=== 步骤24: 编译固件 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step25_build_firmware \
            "${{ env.ENABLE_PARALLEL }}"
      #【firmware-build.yml-24-end】

      #【firmware-build.yml-25】
      - name: "25. 检查构建产物"
        if: success()
        run: |
          echo "=== 步骤25: 检查构建产物 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step26_check_artifacts
      #【firmware-build.yml-25-end】

#【firmware-build.yml-26】
      - name: "26. 上传固件"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.TIMESTAMP_SEC }}
          path: |
            /mnt/openwrt-build/bin/targets/**/*.bin
            /mnt/openwrt-build/bin/targets/**/*.img
          retention-days: 7
          if-no-files-found: warn
#【firmware-build.yml-26-end】

#【firmware-build.yml-27】
      - name: "27. 上传配置文件"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ env.TIMESTAMP_SEC }}
          path: ${{ github.workspace }}/firmware-config/config-backup/
          retention-days: 7
          if-no-files-found: warn
#【firmware-build.yml-27-end】

      #【firmware-build.yml-28】
      - name: "28. 编译后空间检查"
        if: always()
        run: |
          echo "=== 步骤28: 编译后空间检查 ==="
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step29_post_build_space_check
      #【firmware-build.yml-28-end】

#【firmware-build.yml-29】
      - name: "29. 编译总结"
        if: always()
        run: |
          echo "=== 步骤29: 编译总结 ==="
          
          set +e
          
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh \
            step30_build_summary \
            "$FINAL_DEVICE_NAME" \
            "${{ github.event.inputs.version_selection }}" \
            "${{ github.event.inputs.config_mode }}" \
            "${{ env.TIMESTAMP_SEC }}" \
            "${{ github.event.inputs.enable_parallel }}"
          
          STEP30_EXIT_CODE=$?
          echo "步骤29退出码: $STEP30_EXIT_CODE"
          
          set -e
          
          echo "✅ 步骤29 完成（即使有错误也继续）"
#【firmware-build.yml-29-end】
      
#【firmware-build.yml-30】
      - name: "30. 上传错误检查报告"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-report-${{ env.TIMESTAMP_SEC }}
          path: ${{ github.workspace }}/error-reports/
          retention-days: 7
          if-no-files-found: warn
#【firmware-build.yml-30-end】
