#【firmware-build.yml-00】
# OpenWrt 智能固件构建工作流 - 系统主入口
# 版本: 4.5.0
# 最后更新: 2026-05-15
# 新增: feeds强制更新 + ksmbd-tools下载源修复

name: OpenWrt 智能固件构建工作流

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "📦 源码仓库选择"
        required: true
        type: choice
        default: "immortalwrt"
        options: ["immortalwrt", "openwrt", "lede"]
      version_selection:
        description: "🔄 版本选择"
        required: true
        type: choice
        default: "21.02"
        options: ["23.05", "21.02"]
      config_mode:
        description: "⚙️ 配置模式选择"
        required: true
        type: choice
        default: "normal"
        options: ["base", "normal"]
      device_name:
        description: "📱 预定义设备（下拉选择）"
        required: false
        type: choice
        default: "ac42u"
        options: ["ac42u", "cmcc_rax3000m-nand", "netgear_wndr3800"]
      patch_method:
        description: "🔧 补丁选择方式"
        required: true
        type: choice
        default: "不应用补丁"
        options:
          - "不应用补丁"
          - "单选内置补丁"
          - "手动输入多个内置补丁"
          - "自定义补丁命令"
      builtin_patch_single:
        description: "📌 选择单个内置补丁"
        required: false
        type: choice
        default: "none"
        options: ["none", "ac42u-ath10k"]
      builtin_patch_list:
        description: "📋 多个内置补丁"
        required: false
        type: string
        default: ""
      custom_patch_command:
        description: "📝 自定义补丁命令"
        required: false
        type: string
        default: ""
      manual_device_name:
        description: "📝 设备名称（自定义）"
        required: false
        type: string
        default: ""
      manual_target:
        description: "🎯 芯片型号"
        required: false
        type: string
        default: ""
      manual_subtarget:
        description: "🔧 子平台"
        required: false
        type: string
        default: ""
      forbidden_packages:
        description: "🚫 自定义禁用插件"
        required: false
        type: string
        default: "vssr ssr-plus passwall rclone ddns qbittorrent filetransfer samba4 luci-app-samba4 wsdd2"
      extra_packages:
        description: "额外安装插件"
        required: false
        type: string
        default: ""
      enable_parallel:
        description: "⚡ 启用智能并行优化"
        required: false
        type: boolean
        default: true

env:
  BUILD_DIR: "/mnt/openwrt-build"
  REPO_ROOT: "${{ github.workspace }}"
  ENABLE_PARALLEL: "${{ github.event.inputs.enable_parallel }}"
  SOURCE_REPO: "${{ github.event.inputs.source_repo }}"
  FORBIDDEN_PACKAGES: "${{ github.event.inputs.forbidden_packages }}"
  PATCH_METHOD: "${{ github.event.inputs.patch_method }}"
  BUILTIN_PATCH_SINGLE: "${{ github.event.inputs.builtin_patch_single }}"
  BUILTIN_PATCH_LIST: "${{ github.event.inputs.builtin_patch_list }}"
  CUSTOM_PATCH_COMMAND: "${{ github.event.inputs.custom_patch_command }}"
  IS_HANWCKF: "false"
#【firmware-build.yml-00-end】

jobs:
  build-firmware:
    runs-on: ubuntu-22.04

    steps:
#【firmware-build.yml-01】
      - name: "01. 生成时间戳"
        run: |
          echo "=== 步骤01: 生成时间戳 ==="
          sudo timedatectl set-timezone Asia/Shanghai 2>/dev/null || true
          if [ -n "${{ github.event.inputs.manual_device_name }}" ]; then
            FINAL_DEVICE_NAME="${{ github.event.inputs.manual_device_name }}"
          else
            FINAL_DEVICE_NAME="${{ github.event.inputs.device_name }}"
          fi
          SOURCE_REPO_NAME="${{ github.event.inputs.source_repo }}"
          TIMESTAMP_LOCAL=$(date +'%Y%m%d_%H%M%S')
          TIMESTAMP_SEC="${SOURCE_REPO_NAME}-${FINAL_DEVICE_NAME}-${{ github.event.inputs.version_selection }}-${{ github.event.inputs.config_mode }}-${TIMESTAMP_LOCAL}"
          echo "TIMESTAMP_SEC=$TIMESTAMP_SEC" >> $GITHUB_ENV
          echo "FINAL_DEVICE_NAME=$FINAL_DEVICE_NAME" >> $GITHUB_ENV
          echo "SOURCE_REPO_NAME=$SOURCE_REPO_NAME" >> $GITHUB_ENV
          if echo "$FINAL_DEVICE_NAME" | grep -qi "rax3000m"; then
            echo "IS_HANWCKF=true" >> $GITHUB_ENV
          else
            echo "IS_HANWCKF=false" >> $GITHUB_ENV
          fi
          echo "✅ 时间戳: $TIMESTAMP_SEC"
#【firmware-build.yml-01-end】

#【firmware-build.yml-01.5】
      - name: "01.5. 启动错误监控守护进程"
        run: |
          echo "=== 步骤01.5: 启动错误监控守护进程 ==="
          mkdir -p /tmp/build-monitor
          echo '#!/bin/bash' > /tmp/error_monitor.sh
          echo 'MONITOR_DIR="/tmp/build-monitor"' >> /tmp/error_monitor.sh
          echo 'ERROR_LOG="$MONITOR_DIR/errors.log"' >> /tmp/error_monitor.sh
          echo 'DEP_ERROR_LOG="$MONITOR_DIR/dep_errors.log"' >> /tmp/error_monitor.sh
          echo 'BUILD_LOG="/mnt/openwrt-build/build.log"' >> /tmp/error_monitor.sh
          echo 'mkdir -p "$MONITOR_DIR"' >> /tmp/error_monitor.sh
          echo 'echo "" > "$ERROR_LOG"' >> /tmp/error_monitor.sh
          echo 'echo "" > "$DEP_ERROR_LOG"' >> /tmp/error_monitor.sh
          echo 'echo "[$(date)] 监控守护进程启动" >> "$MONITOR_DIR/events.log"' >> /tmp/error_monitor.sh
          echo 'WAIT_COUNT=0' >> /tmp/error_monitor.sh
          echo 'while [ ! -f "$BUILD_LOG" ] && [ $WAIT_COUNT -lt 300 ]; do' >> /tmp/error_monitor.sh
          echo '  sleep 2' >> /tmp/error_monitor.sh
          echo '  WAIT_COUNT=$((WAIT_COUNT+1))' >> /tmp/error_monitor.sh
          echo 'done' >> /tmp/error_monitor.sh
          echo 'tail -f "$BUILD_LOG" 2>/dev/null | while read line; do' >> /tmp/error_monitor.sh
          echo '  echo "$line" | grep -qiE "error:|Error|ERROR|failed:|Failed|make.*\*\*\*" && echo "[$(date)] $line" >> "$ERROR_LOG"' >> /tmp/error_monitor.sh
          echo '  if echo "$line" | grep -qiE "pkg_hash_check_unresolved|cannot find dependency"; then' >> /tmp/error_monitor.sh
          echo '    echo "[$(date)] $line" >> "$DEP_ERROR_LOG"' >> /tmp/error_monitor.sh
          echo '    [[ "$line" =~ for[[:space:]]+([a-zA-Z0-9_-]+) ]] && echo "${BASH_REMATCH[1]}" >> "$MONITOR_DIR/problem_packages.txt"' >> /tmp/error_monitor.sh
          echo '    [[ "$line" =~ dependency[[:space:]]+([a-zA-Z0-9_-]+) ]] && echo "${BASH_REMATCH[1]}" >> "$MONITOR_DIR/missing_deps.txt"' >> /tmp/error_monitor.sh
          echo '  fi' >> /tmp/error_monitor.sh
          echo 'done' >> /tmp/error_monitor.sh
          chmod +x /tmp/error_monitor.sh
          /tmp/error_monitor.sh &
          echo "MONITOR_PID=$!" >> $GITHUB_ENV
          echo "✅ 监控守护进程已启动"
#【firmware-build.yml-01.5-end】

#【firmware-build.yml-02】
      - name: "02. 下载源代码"
        run: |
          echo "=== 步骤02: 下载源代码 ==="
          set -e
          mkdir -p /tmp/openwrt-source
          cd /tmp/openwrt-source
          DEFAULT_BRANCH=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}" | jq -r '.default_branch')
          curl -s -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/tarball/$DEFAULT_BRANCH" -o source.tar.gz
          if [ ! -f "source.tar.gz" ]; then
            echo "❌ 下载失败"
            exit 1
          fi
          tar -xzf source.tar.gz --strip-components=1
          if [ -f "firmware-config/scripts/build_firmware_main.sh" ]; then
            if [ -d "firmware-config/build-Compiler-file" ]; then
              rm -rf firmware-config/build-Compiler-file
            fi
            rsync -av --exclude='.git' . ${{ github.workspace }}/
            mkdir -p /tmp/build-artifacts/source-archive
            cp source.tar.gz /tmp/build-artifacts/source-archive/
          else
            exit 1
          fi
          rm -rf /tmp/openwrt-source
#【firmware-build.yml-02-end】

#【firmware-build.yml-03】
      - name: "03. 上传源代码"
        uses: actions/upload-artifact@v4
        with:
          name: source-${{ env.TIMESTAMP_SEC }}
          path: /tmp/build-artifacts/source-archive/
          retention-days: 7
          if-no-files-found: error
#【firmware-build.yml-03-end】

#【firmware-build.yml-04】
      - name: "04. 修复权限"
        run: |
          chmod +x ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh
          chmod +x ${{ github.workspace }}/support.sh
          find "${{ github.workspace }}/firmware-config/scripts" -name "*.sh" -exec chmod +x {} \;
#【firmware-build.yml-04-end】

#【firmware-build.yml-05】
      - name: "05. 安装基础工具"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libyaml-dev libyaml-cpp-dev libssl-dev libxml2-dev libxslt1-dev libuv1-dev libidn11-dev libidn2-dev libpsl-dev libnghttp2-dev libcap-dev libcap-ng-dev libmnl-dev libnftnl-dev uuid-dev || true
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step05_install_basic_tools
#【firmware-build.yml-05-end】

#【firmware-build.yml-06】
      - name: "06. 初始空间检查"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step06_initial_space_check
#【firmware-build.yml-06-end】

#【firmware-build.yml-07】
      - name: "07. 创建构建目录"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step07_create_build_dir
#【firmware-build.yml-07-end】

#【firmware-build.yml-08】
      - name: "08. 初始化构建环境"
        run: |
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step08_initialize_build_env_hybrid "$FINAL_DEVICE_NAME" "${{ github.event.inputs.version_selection }}" "${{ github.event.inputs.config_mode }}" "${{ github.event.inputs.manual_target }}" "${{ github.event.inputs.manual_subtarget }}"
#【firmware-build.yml-08-end】

#【firmware-build.yml-08.5】
      - name: "08.5. 执行设备补丁"
        run: |
          if [ -f "/mnt/openwrt-build/build_env.sh" ]; then
            source /mnt/openwrt-build/build_env.sh
            DEVICE="$DEVICE"
            SOURCE_REPO_TYPE="$SOURCE_REPO_TYPE"
            SELECTED_BRANCH="$SELECTED_BRANCH"
          else
            DEVICE="$FINAL_DEVICE_NAME"
            SOURCE_REPO_TYPE="${{ github.event.inputs.source_repo }}"
            SELECTED_BRANCH="${{ github.event.inputs.version_selection }}"
          fi
          case "${{ github.event.inputs.patch_method }}" in
            "不应用补丁") PATCH_ARG="none"; EXTRA_ARG="" ;;
            "单选内置补丁") PATCH_ARG="${{ github.event.inputs.builtin_patch_single }}"; EXTRA_ARG="" ;;
            "手动输入多个内置补丁") PATCH_ARG="custom-list"; EXTRA_ARG="${{ github.event.inputs.builtin_patch_list }}" ;;
            "自定义补丁命令")
              printf '%s\n' "${{ github.event.inputs.custom_patch_command }}" > /tmp/custom_patch_commands.sh
              PATCH_ARG="custom"
              EXTRA_ARG="/tmp/custom_patch_commands.sh"
              ;;
          esac
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh execute_patches "$PATCH_ARG" "$DEVICE" "$SOURCE_REPO_TYPE" "$SELECTED_BRANCH" "$EXTRA_ARG"
#【firmware-build.yml-08.5-end】

#【firmware-build.yml-09】
      - name: "09. 添加TurboACC支持"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step11_add_turboacc
#【firmware-build.yml-09-end】

#【firmware-build.yml-10】
      - name: "10. 配置Feeds（强制更新）"
        run: |
          echo "=== 步骤10: 配置Feeds（强制更新） ==="
          cd /mnt/openwrt-build
          if [ -f "feeds.conf.default" ]; then
            cp feeds.conf.default feeds.conf.default.bak
            echo "✅ 已备份 feeds.conf.default"
          fi
          rm -rf feeds
          mkdir -p feeds
          echo "🔄 更新所有 feeds..."
          ./scripts/feeds update -a || true
          echo "🔄 修复 ksmbd-tools 下载源..."
          KSMBD_TOOLS_MAKEFILE=$(find feeds -name "Makefile" -path "*/ksmbd-tools/*" 2>/dev/null | head -1)
          if [ -z "$KSMBD_TOOLS_MAKEFILE" ]; then
            KSMBD_TOOLS_MAKEFILE=$(find package -name "Makefile" -path "*/ksmbd-tools/*" 2>/dev/null | head -1)
          fi
          if [ -n "$KSMBD_TOOLS_MAKEFILE" ] && [ -f "$KSMBD_TOOLS_MAKEFILE" ]; then
            cp "$KSMBD_TOOLS_MAKEFILE" "$KSMBD_TOOLS_MAKEFILE.bak"
            sed -i 's|codeload.github.com/cifsd-team/ksmbd-tools/tar.gz/|github.com/cifsd-team/ksmbd-tools/releases/download/|g' "$KSMBD_TOOLS_MAKEFILE"
            sed -i 's|\.tar.gz?|.tar.gz|g' "$KSMBD_TOOLS_MAKEFILE"
            echo "   ✅ ksmbd-tools 下载源已修复"
          fi
          echo "🔄 安装所有 feeds..."
          ./scripts/feeds install -a || true
          echo "✅ Feeds配置完成"
#【firmware-build.yml-10-end】

#【firmware-build.yml-11】
      - name: "11. 安装TurboACC包"
        if: github.event.inputs.config_mode == 'normal'
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step13_install_turboacc
#【firmware-build.yml-11-end】

#【firmware-build.yml-12】
      - name: "12. 智能配置生成"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step15_generate_config "${{ github.event.inputs.extra_packages }}"
#【firmware-build.yml-12-end】

#【firmware-build.yml-13】
      - name: "13. 验证USB配置"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step16_verify_usb
#【firmware-build.yml-13-end】

#【firmware-build.yml-14】
      - name: "14. USB驱动完整性检查"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step17_check_usb_drivers
#【firmware-build.yml-14-end】

#【firmware-build.yml-15】
      - name: "15. 应用配置"
        run: |
          cd /mnt/openwrt-build
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh apply_config
#【firmware-build.yml-15-end】

#【firmware-build.yml-15.5】
      - name: "15.5. 强制禁用samba4并启用ksmbd"
        run: |
          echo "=== 步骤15.5: 强制禁用samba4并启用ksmbd ==="
          source /mnt/openwrt-build/build_env.sh
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh force_disable_samba4_enable_ksmbd
#【firmware-build.yml-15.5-end】

#【firmware-build.yml-16】
      - name: "16. 备份配置文件"
        run: |
          cd /mnt/openwrt-build
          mkdir -p ${{ github.workspace }}/firmware-config/config-backup
          cp .config "${{ github.workspace }}/firmware-config/config-backup/config_${{ env.TIMESTAMP_SEC }}.config"
#【firmware-build.yml-16-end】

#【firmware-build.yml-17】
      - name: "17. 修复网络环境"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step20_fix_network
#【firmware-build.yml-17-end】

#【firmware-build.yml-18】
      - name: "18. 下载依赖包"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step21_download_deps
#【firmware-build.yml-18-end】

#【firmware-build.yml-19】
      - name: "19. 集成自定义文件"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step22_integrate_custom_files
#【firmware-build.yml-19-end】

#【firmware-build.yml-20】
      - name: "20. 前置错误检查"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step23_pre_build_check
#【firmware-build.yml-20-end】

#【firmware-build.yml-21】
      - name: "21. 编译工具链"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step09_download_sdk "$FINAL_DEVICE_NAME"
#【firmware-build.yml-21-end】

#【firmware-build.yml-22】
      - name: "22. 验证工具链"
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step10_verify_sdk
#【firmware-build.yml-22-end】

#【firmware-build.yml-23】
      - name: "23. 编译前空间检查"
        run: |
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step14_pre_build_space_check
          AVAILABLE_GB=$(df /mnt --output=avail | tail -1 | awk '{print $1/1024/1024}')
          if [ $AVAILABLE_GB -lt 10 ]; then exit 1; fi
#【firmware-build.yml-23-end】

#【firmware-build.yml-24】
      - name: "24. 编译固件"
        id: build_firmware
        continue-on-error: true
        run: |
          set +e
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step25_build_firmware "${{ env.ENABLE_PARALLEL }}"
          BUILD_EXIT=$?
          echo "BUILD_EXIT_CODE=$BUILD_EXIT" >> $GITHUB_ENV
          SYS_FILE=$(find /mnt/openwrt-build/bin/targets -name "*sysupgrade*.bin" -size +5M 2>/dev/null | head -1)
          if [ -n "$SYS_FILE" ]; then
            echo "FIRMWARE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "FIRMWARE_EXISTS=false" >> $GITHUB_ENV
          fi
          exit 0
#【firmware-build.yml-24-end】

#【firmware-build.yml-25】
      - name: "25. 检查构建产物"
        if: success() && env.FIRMWARE_EXISTS == 'true'
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step26_check_artifacts
#【firmware-build.yml-25-end】

#【firmware-build.yml-26】
      - name: "26. 上传固件"
        if: always() && env.FIRMWARE_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.TIMESTAMP_SEC }}
          path: /mnt/openwrt-build/bin/targets/**/*.bin
          retention-days: 7
          if-no-files-found: warn
#【firmware-build.yml-26-end】

#【firmware-build.yml-27】
      - name: "27. 上传配置文件"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ env.TIMESTAMP_SEC }}
          path: ${{ github.workspace }}/firmware-config/config-backup/
          retention-days: 7
          if-no-files-found: warn
#【firmware-build.yml-27-end】

#【firmware-build.yml-28】
      - name: "28. 编译后空间检查"
        if: always()
        run: ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step29_post_build_space_check
#【firmware-build.yml-28-end】

#【firmware-build.yml-29】
      - name: "29. 编译总结"
        if: always() && !cancelled()
        run: |
          set +e
          ${{ github.workspace }}/firmware-config/scripts/build_firmware_main.sh step30_build_summary "$FINAL_DEVICE_NAME" "${{ github.event.inputs.version_selection }}" "${{ github.event.inputs.config_mode }}" "${{ env.TIMESTAMP_SEC }}" "${{ github.event.inputs.enable_parallel }}"
          set -e
#【firmware-build.yml-29-end】

#【firmware-build.yml-30】
      - name: "30. 上传错误检查报告"
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: error-report-${{ env.TIMESTAMP_SEC }}
          path: ${{ github.workspace }}/error-reports/
          retention-days: 7
          if-no-files-found: warn
#【firmware-build.yml-30-end】

#【firmware-build.yml-31】
      - name: "31. 停止监控守护进程"
        if: always() && !cancelled()
        run: |
          sleep 3
          if [ -n "$MONITOR_PID" ] && kill -0 $MONITOR_PID 2>/dev/null; then
            kill $MONITOR_PID 2>/dev/null || true
          fi
#【firmware-build.yml-31-end】

#【firmware-build.yml-32】
      - name: "32. 生成监控报告"
        if: always() && !cancelled()
        run: |
          echo "=========================================="
          echo "📊 错误监控报告"
          echo "=========================================="
          echo "编译退出码: ${BUILD_EXIT_CODE:-未知}"
          echo "固件存在: ${FIRMWARE_EXISTS:-未知}"
          if [ -f /tmp/build-monitor/errors.log ]; then
            echo ""
            echo "错误总数: $(wc -l < /tmp/build-monitor/errors.log)"
            tail -30 /tmp/build-monitor/errors.log | sed 's/^/  /'
          fi
          if [ -f /tmp/build-monitor/dep_errors.log ] && [ -s /tmp/build-monitor/dep_errors.log ]; then
            echo ""
            echo "依赖错误:"
            cat /tmp/build-monitor/dep_errors.log | sed 's/^/  /'
          fi
          mkdir -p ${{ github.workspace }}/monitor-reports
          cp -r /tmp/build-monitor/* ${{ github.workspace }}/monitor-reports/ 2>/dev/null || true
#【firmware-build.yml-32-end】

#【firmware-build.yml-33】
      - name: "33. 上传监控报告"
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-report-${{ env.TIMESTAMP_SEC }}
          path: ${{ github.workspace }}/monitor-reports/
          retention-days: 7
          if-no-files-found: warn
#【firmware-build.yml-33-end】

#【firmware-build.yml-34】
      - name: "34. 最终状态检查"
        if: always() && env.FIRMWARE_EXISTS != 'true'
        run: |
          echo "=========================================="
